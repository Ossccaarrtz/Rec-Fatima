<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recepciones Fátima</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
  <header class="video-hero">
    <div class="top-contact text-white position-absolute w-100 text-start p-2 ps-4">
      <span>Contáctate con nosotros <i class="fas fa-arrow-right"></i></span>
      <a href="https://wa.link/cqn83t" target="_blank">
        <img src="SaloContenido/wp.jpg" alt="WhatsApp" style="width: 28px; height: 28px; margin-left: 8px;">
      </a>
    </div>

    <video autoplay muted loop playsinline class="bg-video">
      <source src="SaloContenido/hero.mp4.mp4" type="video/mp4" />
      Tu navegador no soporta video en HTML5.
    </video>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="static-title">Recepciones Fátima</h1>
      <p class="fs-4">Haz de tu evento un momento especial</p>
    </div>
  </header>

  <section class="section-text">
    <h2>Atención personalizada</h2>
    <p>Garantía de calidad y servicio</p>
  </section>

  <section class="container mb-5">
    <h2 class="text-center mb-4">Momentos Capturados</h2>
    <div id="carouselImages" class="carousel slide" data-bs-interval="false">
      <div class="carousel-inner">
        <div class="carousel-item active"><img src="SaloContenido/img1.jpg" alt="..."></div>
        <div class="carousel-item"><img src="SaloContenido/img2.jpg" alt="..."></div>
        <div class="carousel-item"><img src="SaloContenido/img3.jpg" alt="..."></div>
        <div class="carousel-item"><img src="SaloContenido/img4.jpg" alt="..."></div>
        <div class="carousel-item"><img src="SaloContenido/img5.jpg" alt="..."></div>
        <div class="carousel-item"><img src="SaloContenido/img6.jpg" alt="..."></div>
        <div class="carousel-item"><img src="SaloContenido/img7.jpg" alt="..."></div>
        <div class="carousel-item"><img src="SaloContenido/img8.jpg" alt="..."></div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselImages" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselImages" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </section>

  <section class="container mb-5">
    <h2 class="text-center mb-4">Instantes Inolvidables</h2>
    <div id="carouselVideos" class="carousel slide" data-bs-interval="false">
      <div class="carousel-inner">
        <div class="carousel-item active"><video controls><source src="SaloContenido/video1.mp4" type="video/mp4"></video></div>
        <div class="carousel-item"><video controls><source src="SaloContenido/video2.mp4" type="video/mp4"></video></div>
        <div class="carousel-item"><video controls><source src="SaloContenido/video3.mp4" type="video/mp4"></video></div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselVideos" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselVideos" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </section>

  <section class="container mb-5">
    <h2 class="text-center mb-4 d-flex justify-content-center align-items-center gap-2">
      Servicios Extra
    </h2>
    <div id="carouselExtras" class="carousel slide" data-bs-interval="false">
      <div class="carousel-inner">
        <div class="carousel-item active"><img src="SaloContenido/espejo.jpg" alt="..."></div>
        <div class="carousel-item"><img src="SaloContenido/3601.jpg" alt="..."></div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExtras" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselExtras" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </section>

  <footer class="text-center py-4" style="background-color: #1e1a17; color: #d4af37;">
  &copy; Recepciones Fátima
</footer>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
